  async function getProducts() {
    const doc = await db.collection("website").doc("data").get();
    if (doc.exists) return doc.data().products || [];
    return [];
  }

  async function saveProductsToCloud(products) {
    await db.collection("website").doc("data").set({ products: products });
  }

  async function saveProducts(products) {
    await saveProductsToCloud(products);
    alert('Products saved to cloud successfully! Refresh your main website to see changes.');
  }

  async function forceLoadProducts() {
    if (!confirm('This will overwrite the database with the 18 default products. Continue?')) return;
    await saveProductsToCloud(defaultProducts);
    alert('Products loaded! Refresh the page.');
    renderProducts();
    updateDashboard();
  }

  function doLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (email === 'collinspeter376@gmail.com' && password === 'kAS_t239iufkjsewf') {
      localStorage.setItem('dfw_loggedin', 'true');
      showAdminPanel();
    } else {
      document.getElementById('loginError').classList.remove('hidden');
    }
  }
  function doLogout() {
    localStorage.removeItem('dfw_loggedin');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
  }
  function showAdminPanel() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    updateDashboard();
    renderProducts();
  }
  function showSection(name) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById('section-' + name).classList.remove('hidden');
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    event.target.closest('.sidebar-link').classList.add('active');
    if (name === 'products') renderProducts();
    if (name === 'dashboard') updateDashboard();
  }
  async function updateDashboard() {
    const products = await getProducts();
    document.getElementById('statProducts').textContent = products.length;
    const totalValue = products.reduce((sum, p) => sum + (p.priceNum || 0), 0);
    document.getElementById('statValue').textContent = '£' + totalValue.toLocaleString();
    const categories = [...new Set(products.map(p => p.type))];
    document.getElementById('statCategories').textContent = categories.length;
  }
  async function renderProducts() {
    const products = await getProducts();
    const html = products.map(p => `
      <div class="table-row">
        <div class="text-xs text-gray-400">${p.sku}</div>
        <div class="text-white">${p.name}</div>
        <div class="text-gray-400 text-sm">${p.type}</div>
        <div class="text-yellow-500 font-bold">£${p.price}</div>
        <div class="flex gap-2">
          <button onclick="editProduct('${p.sku}')" class="btn btn-secondary text-xs">Edit</button>
          <button onclick="deleteProduct('${p.sku}')" class="btn btn-danger text-xs">Delete</button>
        </div>
      </div>
    `).join('');
    document.getElementById('productsList').innerHTML = html || '<p class="text-gray-400 p-4">No products yet</p>';
  }
  async function editProduct(sku) {
    const products = await getProducts();
    const p = products.find(x => x.sku === sku);
    if (!p) return;
    document.getElementById('productFormTitle').textContent = 'Edit Product: ' + p.name;
    document.getElementById('editSku').value = p.sku;
    document.getElementById('pSku').value = p.sku;
    document.getElementById('pName').value = p.name;
    document.getElementById('pType').value = p.type;
    document.getElementById('pBrand').value = p.brand;
    document.getElementById('pYear').value = p.year;
    document.getElementById('pHours').value = p.hrs || '';
    document.getElementById('pWeight').value = p.weight || '';
    document.getElementById('pPrice').value = p.price || '';
    document.getElementById('pSerial').value = p.serial || '';
    document.getElementById('pImg').value = p.img || '';
    document.getElementById('pImages').value = (p.images || []).join(', ');
    document.getElementById('pDescription').value = p.description || '';
    const specsText = Object.entries(p.specs || {}).map(([k,v]) => `${k}: ${v}`).join('\n');
    document.getElementById('pSpecs').value = specsText;
    showSection('addProduct');
  }
  async function deleteProduct(sku) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    let products = await getProducts();
    products = products.filter(p => p.sku !== sku);
    await saveProducts(products);
    renderProducts();
    updateDashboard();
  }
  async function saveProduct(e) {
    e.preventDefault();
    const editSku = document.getElementById('editSku').value;
    const sku = document.getElementById('pSku').value;
    const name = document.getElementById('pName').value;
    const type = document.getElementById('pType').value;
    const brand = document.getElementById('pBrand').value;
    const year = document.getElementById('pYear').value;
    const hrs = document.getElementById('pHours').value;
    const weight = document.getElementById('pWeight').value;
    const price = document.getElementById('pPrice').value;
    const serial = document.getElementById('pSerial').value;
    const img = document.getElementById('pImg').value;
    const imagesText = document.getElementById('pImages').value;
    const description = document.getElementById('pDescription').value;
    const specsText = document.getElementById('pSpecs').value;
    
    const images = imagesText ? imagesText.split(',').map(s => s.trim()).filter(s => s) : [img];
    const specs = {};
    specsText.split('\n').forEach(line => {
      const parts = line.split(':');
      if (parts.length >= 2) specs[parts[0].trim()] = parts.slice(1).join(':').trim();
    });
    
    const priceNum = parseInt(price.replace(/,/g, '')) || 0;
    const product = { sku, name, type, brand, year, hrs, weight, price, priceNum, serial: serial || undefined, img, images, description, specs };
    
    let products = await getProducts();
    if (editSku) {
      const idx = products.findIndex(p => p.sku === editSku);
      if (idx >= 0) products[idx] = product;
    } else {
      products.push(product);
    }
    
    await saveProducts(products);
    document.getElementById('productForm').reset();
    document.getElementById('editSku').value = '';
    document.getElementById('productFormTitle').textContent = 'Add New Product';
    showSection('products');
  }

  if (localStorage.getItem('dfw_loggedin') === 'true') {
    showAdminPanel();
  }
